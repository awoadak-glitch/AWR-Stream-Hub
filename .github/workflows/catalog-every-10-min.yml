name: Catalog Auto Pull
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Pull 100 items per type and dedupe
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python backend/scripts/catalog_updater.py --limit 100
      - name: Commit catalog updates
        run: |
          git config user.name "AWR Bot"
          git config user.email "actions@github.com"
          git add data/catalog data/state.json
          git commit -m "auto: refresh catalog" || echo "No changes"
          git push || true
