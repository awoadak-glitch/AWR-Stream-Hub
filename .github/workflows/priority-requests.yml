name: Priority Requests Worker
on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Requested movie/series/anime title'
        required: true
      kind:
        description: 'movie | kdrama | anime | subtitle'
        required: false
        default: 'movie'
permissions:
  contents: write
  issues: write
jobs:
  request:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Process priority request
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python backend/scripts/request_worker.py --title "${{ github.event.inputs.title }}" --kind "${{ github.event.inputs.kind }}"
      - name: Commit request result
        run: |
          git config user.name "AWR Request Bot"
          git config user.email "actions@github.com"
          git add data
          git commit -m "request: ${{ github.event.inputs.title }}" || echo "No changes"
          git push || true
