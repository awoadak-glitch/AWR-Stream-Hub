name: Subtitle Demand Worker
on:
  workflow_dispatch:
    inputs:
      media_id:
        description: 'Catalog media id'
        required: true
      source_language:
        description: 'original language'
        required: false
        default: 'auto'
      source_srt_url:
        description: 'optional legal source SRT URL'
        required: false
        default: ''
      video_url:
        description: 'optional legal video/audio URL'
        required: false
        default: ''
  repository_dispatch:
    types: [subtitle_request]
permissions:
  contents: write
jobs:
  subtitle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install media tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Resolve subtitle request
        id: req
        run: |
          echo "media_id=${{ github.event.inputs.media_id || github.event.client_payload.media_id }}" >> "$GITHUB_OUTPUT"
          echo "source_language=${{ github.event.inputs.source_language || github.event.client_payload.source_language || 'auto' }}" >> "$GITHUB_OUTPUT"
          echo "source_srt_url=${{ github.event.inputs.source_srt_url || github.event.client_payload.source_srt_url || '' }}" >> "$GITHUB_OUTPUT"
          echo "video_url=${{ github.event.inputs.video_url || github.event.client_payload.video_url || '' }}" >> "$GITHUB_OUTPUT"
      - name: Build AR/EN SRT package
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python backend/scripts/subtitle_worker.py --media-id "${{ steps.req.outputs.media_id }}" --source-language "${{ steps.req.outputs.source_language }}" --source-srt-url "${{ steps.req.outputs.source_srt_url }}" --video-url "${{ steps.req.outputs.video_url }}"
      - name: Commit subtitles
        run: |
          git config user.name "AWR Subtitle Bot"
          git config user.email "actions@github.com"
          git add data
          git commit -m "subtitle: ${{ steps.req.outputs.media_id }}" || echo "No changes"
          git push || true
